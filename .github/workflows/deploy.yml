name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Basic Test
        run: echo "Test passed successfully"

      - name: Build Docker Image
        run: docker build -t devops-app .